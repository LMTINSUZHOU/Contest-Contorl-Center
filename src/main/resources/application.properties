spring.application.name=contest
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/contest}
spring.datasource.username=${DB_USERNAME:contest}
spring.datasource.password=${DB_PASSWORD:contest}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.security.jwt-secret=${JWT_SECRET:contest-management-system-dev-secret-change-me-please}
app.security.jwt-expiration-minutes=${JWT_EXPIRATION_MINUTES:720}
app.storage.certificate-dir=${CERTIFICATE_DIR:storage/certificates}
app.admin.email=${ADMIN_EMAIL:admin@contest.local}
app.admin.password=${ADMIN_PASSWORD:Admin@123456}
