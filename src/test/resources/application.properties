spring.application.name=contest-test
spring.datasource.url=jdbc:h2:mem:contest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false
springdoc.api-docs.enabled=false
app.security.jwt-secret=contest-test-secret-change-me-please-1234567890
app.security.jwt-expiration-minutes=60
app.storage.certificate-dir=${java.io.tmpdir}/contest-test-certificates
app.admin.email=admin@contest.local
app.admin.password=Admin@123456
